<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Painel Administrativo - SSP</title>
  <meta name="description" content="Painel Operacional da Secretaria de Segurança Pública — Gestão administrativa, tickets, bate-ponto e relatórios." />
  <meta name="theme-color" content="#1b52f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <!-- Tailwind CSS and FontAwesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Tailwind Custom Colors Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: {
            'bounce-slow': 'bounce 3s infinite',
            'fade-in-up': 'fadeInUp 0.4s cubic-bezier(.16,1,.3,1)',
            'slide-in-right': 'slideInRight 0.3s cubic-bezier(.16,1,.3,1)',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' }
            }
          },
          colors: {
            brand: {
              50: '#eef3ff',
              100: '#dce6fe',
              200: '#b9cdfd',
              300: '#85a8fb',
              400: '#5b86f7',
              500: '#003078', // SSP Navy
              600: '#1d4ed8',
              700: '#1e40af',
              800: '#002060',
              900: '#001540'
            },
            dark: {
              950: '#080c14',
              900: '#0b1018',
              800: '#0f1520',
              700: '#1a2236',
              600: '#2a3450'
            }
          }
        }
      }
    };
  </script>

  <!-- Custom Design Tokens System -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen antialiased selection:bg-brand-500/25 font-sans bg-[var(--bg-color)] text-[var(--text-main)]">
  
  <!-- SPA Main Containers -->
  <div id="app-root"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed bottom-5 right-5 z-[100] space-y-3 flex flex-col items-end"></div>

  <!-- Core Modules (Utilities, API, State, Components) -->
  <script src="/js/core/core.js"></script>

  <!-- SPA Client Logic App -->
  <script src="/js/app.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
